version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    volumes:
      - .:/var/www
    environment:
      - APP_ENV=local
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - notification-net

  nginx:
    image: nginx:1.25-alpine
    ports:
      - "8080:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - notification-net

  worker_high:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    command: php artisan queue:work rabbitmq_high --queue=notifications.transactional --tries=3 --sleep=3 --max-time=3600 --max-jobs=1000
    volumes:
      - .:/var/www
    environment:
      - APP_ENV=local
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    networks:
      - notification-net

  worker_low:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    command: php artisan queue:work rabbitmq_low --queue=notifications.marketing --tries=3 --sleep=3 --max-time=3600 --max-jobs=1000
    volumes:
      - .:/var/www
    environment:
      - APP_ENV=local
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    networks:
      - notification-net

  scheduler:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    command: php artisan schedule:work
    volumes:
      - .:/var/www
    environment:
      - APP_ENV=local
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    networks:
      - notification-net

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: notifications
      POSTGRES_USER: app
      POSTGRES_PASSWORD: secret
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d notifications"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - notification-net

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    ports:
      - "127.0.0.1:15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: app
      RABBITMQ_DEFAULT_PASS: secret
    volumes:
      - rabbitmqdata:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 10s
      retries: 10
    networks:
      - notification-net

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass secret
    volumes:
      - redisdata:/data
    networks:
      - notification-net

volumes:
  pgdata:
  rabbitmqdata:
  redisdata:

networks:
  notification-net:
    driver: bridge
